<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camellia Coffee Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --warm-white: #fff9f2;
    --espresso: #2c1a0e;
    --mocha: #5c3317;
    --caramel: #c07c3a;
    --latte: #d4a96a;
    --foam: #f3e4c6;
    --shadow: rgba(44,26,14,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--espresso);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--espresso);
    padding: 28px 24px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .logo-icon { font-size: 28px; }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--latte);
    letter-spacing: 0.5px;
  }

  header p {
    color: rgba(212,169,106,0.6);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* CUSTOMER NAME INPUT */
  .customer-bar {
    background: var(--foam);
    border-bottom: 1px solid rgba(192,124,58,0.2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .customer-bar label {
    font-size: 13px;
    font-weight: 500;
    color: var(--mocha);
    white-space: nowrap;
  }

  .customer-bar input {
    flex: 1;
    border: 1.5px solid var(--latte);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: white;
    color: var(--espresso);
    outline: none;
    transition: border-color 0.2s;
  }
  .customer-bar input:focus { border-color: var(--caramel); }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    overflow-x: auto;
    gap: 0;
    background: var(--espresso);
    padding: 0 16px;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: rgba(212,169,106,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--latte);
    border-bottom-color: var(--caramel);
  }

  /* MAIN CONTENT */
  main { padding: 20px 16px 180px; max-width: 480px; margin: 0 auto; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--mocha);
    margin: 8px 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--latte), transparent);
    opacity: 0.4;
  }

  .menu-grid { display: flex; flex-direction: column; gap: 10px; }

  .menu-card {
    background: white;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    border: 1.5px solid transparent;
  }
  .menu-card:active { transform: scale(0.98); }
  .menu-card.selected {
    border-color: var(--caramel);
    background: #fff8ef;
  }

  .menu-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: var(--foam);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .menu-info { flex: 1; min-width: 0; }
  .menu-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--espresso);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-sub {
    font-size: 11px;
    color: var(--caramel);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    background: var(--foam);
    color: var(--mocha);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 500;
  }

  .menu-price {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--caramel);
    flex-shrink: 0;
  }

  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--foam);
    color: var(--espresso);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
  }
  .qty-btn:active { background: var(--latte); }
  .qty-btn.plus { background: var(--caramel); color: white; }
  .qty-num {
    font-size: 14px;
    font-weight: 600;
    min-width: 18px;
    text-align: center;
    color: var(--espresso);
  }

  /* TEMP SELECTOR */
  .temp-row {
    display: flex;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--foam);
    gap: 8px;
  }
  .temp-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    background: var(--cream);
    border: 1.5px solid var(--foam);
    border-radius: 10px;
    padding: 7px 6px;
    transition: all 0.15s;
  }
  .temp-block.active-hot { border-color: #e55; background: #fff0f0; }
  .temp-block.active-ice { border-color: #5ae; background: #f0f8ff; }
  .temp-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--mocha);
  }
  .temp-block.active-hot .temp-label { color: #c33; }
  .temp-block.active-ice .temp-label { color: #247; }
  .temp-qty {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .temp-btn-sm {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: var(--foam);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    color: var(--espresso);
    transition: background 0.12s;
  }
  .temp-btn-sm.add { background: var(--caramel); color: white; }
  .temp-btn-sm:active { opacity: 0.7; }
  .temp-qty-num {
    font-size: 13px;
    font-weight: 700;
    min-width: 16px;
    text-align: center;
    color: var(--espresso);
  }

  /* CART */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--foam);
    padding: 16px 20px;
    max-width: 480px;
    margin: 0 auto;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    box-shadow: 0 -8px 30px rgba(44,26,14,0.12);
    z-index: 200;
  }

  .cart-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cart-count { font-size: 13px; color: var(--mocha); }
  .cart-count span { font-weight: 700; color: var(--caramel); }
  .cart-total {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--espresso);
  }

  .order-btn {
    width: 100%;
    padding: 15px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .order-btn:active { transform: scale(0.98); }
  .order-btn:hover { background: #1ebe5a; }
  .order-btn:disabled { background: #ccc; cursor: not-allowed; }
  .order-btn svg { width: 20px; height: 20px; fill: white; }

  .cart-empty {
    text-align: center;
    color: rgba(92,51,23,0.35);
    font-size: 13px;
    padding: 4px 0 2px;
  }

  .note-input {
    width: 100%;
    border: 1.5px solid var(--foam);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--espresso);
    background: var(--cream);
    outline: none;
    resize: none;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--latte); }

  /* SUCCESS TOAST */
  .toast {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--espresso);
    color: var(--latte);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-icon">☕</span>
    <div>
      <h1>Camellia Coffee</h1>
      <p>Pesan • Nikmati • Bahagia</p>
    </div>
  </div>
</header>

<div class="customer-bar" style="flex-direction:column;align-items:stretch;gap:10px;">
  <div style="display:flex;align-items:center;gap:12px;">
    <label style="font-size:13px;font-weight:500;color:var(--mocha);white-space:nowrap;">👤 Nama:</label>
    <input type="text" id="customerName" placeholder="Masukkan nama kamu..." autocomplete="off">
  </div>
  <div style="display:flex;align-items:flex-start;gap:12px;">
    <label style="font-size:13px;font-weight:500;color:var(--mocha);white-space:nowrap;padding-top:8px;">📍 Alamat:</label>
    <textarea id="customerAddress" rows="2" placeholder="Alamat pengiriman (opsional)..." style="flex:1;border:1.5px solid var(--latte);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;background:white;color:var(--espresso);outline:none;resize:none;transition:border-color 0.2s;"></textarea>
  </div>
</div>

<div class="tab-nav" id="tabNav"></div>

<main id="menuContainer"></main>

<div class="cart-bar" id="cartBar">
  <div id="cartContent">
    <p class="cart-empty" id="emptyMsg">🛒 Belum ada pesanan. Pilih menu dulu yuk!</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WHATSAPP_NUMBER = "6288216395932"; // ← GANTI NOMOR WA TOKO

const menu = [
  { id: 1,  cat: "ESPRESSO BASED", name: "Camelliano",           price: 24500, temp: "both", icon: "☕" },
  { id: 2,  cat: "ESPRESSO BASED", name: "Camelliano Rempah",    price: 26500, temp: "hot",  icon: "🌶️" },
  { id: 3,  cat: "ESPRESSO BASED", name: "Cafe Latte",           price: 24500, temp: "both", icon: "☕" },
  { id: 4,  cat: "ESPRESSO BASED", name: "Espresso",             price: 15500, temp: "hot",  icon: "⚡" },
  { id: 5,  cat: "ESPRESSO BASED", name: "Americano",            price: 20000, temp: "both", icon: "☕" },
  { id: 6,  cat: "ESPRESSO BASED", name: "Mocha Latte",          price: 24500, temp: "both", icon: "🍫" },
  { id: 7,  cat: "ESPRESSO BASED", name: "Caramel Machiato",     price: 26500, temp: "both", icon: "🍮" },
  { id: 8,  cat: "ESPRESSO BASED", name: "Vanilla Latte",        price: 26500, temp: "both", icon: "🌿" },
  { id: 9,  cat: "ESPRESSO BASED", name: "Kopi Susu Klasik",     price: 26500, temp: "both", icon: "🥛" },
  { id: 10, cat: "ESPRESSO BASED", name: "Kopi Pandan Latte",    price: 24500, temp: "both", icon: "🌿" },
  { id: 11, cat: "ESPRESSO BASED", name: "Kopi Kurma 250ml",     price: 27500, temp: "ice",  icon: "🌴" },
  { id: 12, cat: "ESPRESSO BASED", name: "Kopi Kurma 500ml",     price: 50000, temp: "ice",  icon: "🌴" },
  { id: 13, cat: "ESPRESSO BASED", name: "Banana Latte",         price: 26500, temp: "both", icon: "🍌" },
  { id: 14, cat: "ESPRESSO BASED", name: "Butterscotch Latte",   price: 26500, temp: "both", icon: "🍬" },
  { id: 15, cat: "ESPRESSO BASED", name: "Spanish Latte",        price: 26500, temp: "both", icon: "☕" },
  { id: 16, cat: "ESPRESSO BASED", name: "Lemon Coffee",         price: 24500, temp: "ice",  icon: "🍋" },
  { id: 17, cat: "MANUAL BREWING", name: "V60",                  price: 24500, temp: "hot",  icon: "☕" },
  { id: 18, cat: "MANUAL BREWING", name: "Japanese",             price: 26500, temp: "ice",  icon: "🧊" },
  { id: 19, cat: "MANUAL BREWING", name: "Japanese Coffee Lemon",price: 26500, temp: "ice",  icon: "🍋" },
  { id: 20, cat: "MANUAL BREWING", name: "Vietnam Drip",         price: 20000, temp: "both", icon: "🇻🇳" },
  { id: 21, cat: "MANUAL BREWING", name: "Tubruk",               price: 20000, temp: "hot",  icon: "☕" },
  { id: 22, cat: "NON COFFEE",     name: "Chocolate",            price: 24500, temp: "both", icon: "🍫" },
  { id: 23, cat: "NON COFFEE",     name: "Chocolate Mint",       price: 26500, temp: "both", icon: "🌿" },
  { id: 24, cat: "NON COFFEE",     name: "Red Velvet",           price: 24500, temp: "both", icon: "❤️" },
  { id: 25, cat: "NON COFFEE",     name: "Matcha Latte",         price: 24500, temp: "both", icon: "🍵" },
  { id: 26, cat: "NON COFFEE",     name: "Taro",                 price: 24500, temp: "both", icon: "🟣" },
  { id: 27, cat: "NON COFFEE",     name: "Strawberry Mint Tea",  price: 24500, temp: "ice",  icon: "🍓" },
  { id: 28, cat: "NON COFFEE",     name: "Leci Mint Tea",        price: 24500, temp: "ice",  icon: "🫒" },
  { id: 29, cat: "NON COFFEE",     name: "Peach Mint Tea",       price: 24500, temp: "ice",  icon: "🍑" },
];

const catLabels = {
  "ESPRESSO BASED": "☕ Espresso Based",
  "MANUAL BREWING": "🫗 Manual Brewing",
  "NON COFFEE": "🍵 Non Coffee"
};

// cart key = "itemId_temp" e.g. "5_Hot", "5_Ice", "4_Hot"
// For fixed-temp items key = "itemId_Hot" or "itemId_Ice"
let cart = {}; // key -> { item, qty, temp }
let activeTab = "ESPRESSO BASED";

const categories = [...new Set(menu.map(m => m.cat))];

const tabNav = document.getElementById("tabNav");
categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (cat === activeTab ? " active" : "");
  btn.textContent = catLabels[cat];
  btn.onclick = () => switchTab(cat);
  tabNav.appendChild(btn);
});

function switchTab(cat) {
  activeTab = cat;
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", categories[i] === cat);
  });
  renderMenu();
}

function formatRp(n) {
  return "Rp " + n.toLocaleString("id-ID");
}

function cartKey(id, temp) { return id + "_" + temp; }

function getItemQty(id, temp) {
  const k = cartKey(id, temp);
  return cart[k] ? cart[k].qty : 0;
}

function getTotalQtyForItem(id) {
  return (getItemQty(id, "Hot") + getItemQty(id, "Ice"));
}

function changeQty(id, temp, delta, e) {
  e.stopPropagation();
  const item = menu.find(m => m.id === id);
  const k = cartKey(id, temp);
  if (!cart[k] && delta > 0) {
    cart[k] = { item, qty: 1, temp };
  } else if (cart[k]) {
    cart[k].qty += delta;
    if (cart[k].qty <= 0) delete cart[k];
  }
  renderMenu();
  renderCart();
}

function renderMenu() {
  const container = document.getElementById("menuContainer");
  const items = menu.filter(m => m.cat === activeTab);
  container.innerHTML = `<h2 class="section-title">${catLabels[activeTab]}</h2><div class="menu-grid" id="grid"></div>`;
  const grid = document.getElementById("grid");

  items.forEach(item => {
    const totalQty = getTotalQtyForItem(item.id);
    const card = document.createElement("div");
    card.className = "menu-card" + (totalQty > 0 ? " selected" : "");

    let tempBadge = item.temp === "hot" ? "🔥 Hot" : item.temp === "ice" ? "🧊 Ice" : "🔥 Hot / 🧊 Ice";

    let tempRowHtml = "";
    if (item.temp === "both") {
      const qH = getItemQty(item.id, "Hot");
      const qI = getItemQty(item.id, "Ice");
      tempRowHtml = `
        <div class="temp-row">
          <div class="temp-block ${qH > 0 ? "active-hot" : ""}">
            <div class="temp-label">🔥 Hot</div>
            <div class="temp-qty">
              ${qH > 0 ? `<button class="temp-btn-sm" onclick="changeQty(${item.id},'Hot',-1,event)">−</button>` : ""}
              ${qH > 0 ? `<span class="temp-qty-num">${qH}</span>` : ""}
              <button class="temp-btn-sm add" onclick="changeQty(${item.id},'Hot',1,event)">+</button>
            </div>
          </div>
          <div class="temp-block ${qI > 0 ? "active-ice" : ""}">
            <div class="temp-label">🧊 Ice</div>
            <div class="temp-qty">
              ${qI > 0 ? `<button class="temp-btn-sm" onclick="changeQty(${item.id},'Ice',-1,event)">−</button>` : ""}
              ${qI > 0 ? `<span class="temp-qty-num">${qI}</span>` : ""}
              <button class="temp-btn-sm add" onclick="changeQty(${item.id},'Ice',1,event)">+</button>
            </div>
          </div>
        </div>`;
    } else {
      // fixed temp item
      const fixedTemp = item.temp === "hot" ? "Hot" : "Ice";
      const q = getItemQty(item.id, fixedTemp);
      tempRowHtml = `
        <div class="temp-row" style="justify-content:flex-end;border-top:none;margin-top:4px;padding-top:0;">
        </div>`;
      // for fixed temp we show qty in right column
      card.innerHTML = `
        <div class="menu-icon">${item.icon}</div>
        <div class="menu-info">
          <div class="menu-name">${item.name}</div>
          <div class="menu-sub"><span class="badge">${tempBadge}</span></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <div class="menu-price">${formatRp(item.price)}</div>
          <div class="qty-ctrl">
            ${q > 0 ? `<button class="qty-btn minus" onclick="changeQty(${item.id},'${fixedTemp}',-1,event)">−</button><span class="qty-num">${q}</span>` : ""}
            <button class="qty-btn plus" onclick="changeQty(${item.id},'${fixedTemp}',1,event)">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
      return;
    }

    card.innerHTML = `
      <div style="display:flex;gap:14px;align-items:flex-start;width:100%;">
        <div class="menu-icon">${item.icon}</div>
        <div class="menu-info" style="flex:1;min-width:0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div class="menu-name">${item.name}</div>
            <div class="menu-price" style="flex-shrink:0;">${formatRp(item.price)}</div>
          </div>
          <div class="menu-sub"><span class="badge">${tempBadge}</span></div>
          ${tempRowHtml}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderCart() {
  const cartContent = document.getElementById("cartContent");
  const keys = Object.keys(cart);

  if (keys.length === 0) {
    cartContent.innerHTML = `<p class="cart-empty">🛒 Belum ada pesanan. Pilih menu dulu yuk!</p>`;
    return;
  }

  const total = keys.reduce((s, k) => s + cart[k].item.price * cart[k].qty, 0);
  const totalQty = keys.reduce((s, k) => s + cart[k].qty, 0);

  cartContent.innerHTML = `
    <div class="cart-summary">
      <div class="cart-count">🛒 <span>${totalQty}</span> item dipilih</div>
      <div class="cart-total">${formatRp(total)}</div>
    </div>
    <textarea class="note-input" id="orderNote" rows="1" placeholder="📝 Catatan pesanan (opsional)..."></textarea>
    <button class="order-btn" onclick="sendOrder()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
      Pesan via WhatsApp
    </button>
  `;
}

function sendOrder() {
  const name = document.getElementById("customerName").value.trim();
  if (!name) {
    showToast("⚠️ Isi nama kamu dulu ya!");
    document.getElementById("customerName").focus();
    return;
  }

  const keys = Object.keys(cart);
  if (keys.length === 0) return;

  const address = document.getElementById("customerAddress")?.value?.trim() || "";
  const note = document.getElementById("orderNote")?.value?.trim() || "";
  const total = keys.reduce((s, k) => s + cart[k].item.price * cart[k].qty, 0);

  let lines = ["Halo Camellia Coffee! ☕\n"];
  lines.push(`*Nama:* ${name}`);
  if (address) lines.push(`*Alamat:* ${address}`);
  lines.push("\n*Pesanan:*");
  keys.forEach(k => {
    const { item, qty, temp } = cart[k];
    lines.push(`• ${item.name} (${temp}) x${qty} — ${formatRp(item.price * qty)}`);
  });
  lines.push(`\n*Total: ${formatRp(total)}*`);
  if (note) lines.push(`\n*Catatan:* ${note}`);

  const msg = encodeURIComponent(lines.join("\n"));
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, "_blank");

  showToast("✅ Pesanan dikirim ke WhatsApp!");
  cart = {};
  renderMenu();
  renderCart();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

renderMenu();
renderCart();
</script>
</body>
</html>
